name: Glossy Release

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Grant execute permission
        run: chmod +x gradlew

      - name: Build Glossy release APK
        run: ./gradlew assembleGithubRelease

      - name: Upload Glossy release artifact
        uses: actions/upload-artifact@v4
        with:
          name: Glossy-release
          path: app/build/outputs/apk/github/release/*.apk

      - name: Set tag name
        run: echo "TAG_NAME=v${GITHUB_RUN_NUMBER}" >> $GITHUB_ENV

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.TAG_NAME }}
          name: Glossy ${{ env.TAG_NAME }}
          generate_release_notes: true
          files: app/build/outputs/apk/github/release/*.apk
