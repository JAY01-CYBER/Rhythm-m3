name: Release APKs

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Grant execute permission to gradlew
        run: chmod +x ./gradlew

      - name: Build githubRelease APKs
        run: ./gradlew assembleGithubRelease

      - name: List generated APKs
        run: find app/build/outputs/apk -type f -name "*.apk"

      - name: Collect release APKs
        run: |
          mkdir -p release-apks

          find app/build/outputs/apk -type f -name "*github*release*.apk" | while read file; do
            name=$(basename "$file")

            if [[ "$name" == *"armeabi-v7a"* ]]; then
              cp "$file" "release-apks/Glossy-v1.0.1-github-armeabi-v7a.apk"
            elif [[ "$name" == *"arm64-v8a"* ]]; then
              cp "$file" "release-apks/Glossy-v1.0.1-github-arm64-v8a.apk"
            elif [[ "$name" == *"universal"* ]]; then
              cp "$file" "release-apks/Glossy-v1.0.1-github-universal.apk"
            fi
          done

          ls -lah release-apks

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.0.1
          name: Glossy v1.0.1
          body: |
            **What's New:**
            - Initial stable release of Glossy
            - GitHub updater now uses Glossy repository
            - Added release builds for armeabi-v7a, arm64-v8a and universal
            - General fixes and improvements

            **Known Issues:**
            - None for now

            **Build Information:**
            - Channel: Stable
            - Variant: github
            - Version: v1.0.1
          files: |
            release-apks/*.apk
          draft: false
          prerelease: false
