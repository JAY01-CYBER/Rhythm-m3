name: Glossy Release

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Grant execute permission
        run: chmod +x gradlew

      - name: Set version tag
        run: echo "TAG_NAME=v${GITHUB_RUN_NUMBER}" >> $GITHUB_ENV

      - name: Build Glossy release APK
        run: ./gradlew assembleGithubRelease

      - name: Rename APK
        run: |
          mkdir -p release-output
          APK_FILE=$(find app/build/outputs/apk/github/release -name "*.apk" | head -n 1)
          cp "$APK_FILE" "release-output/Glossy-${TAG_NAME}.apk"

      - name: Upload Glossy release artifact
        uses: actions/upload-artifact@v4
        with:
          name: Glossy-release
          path: release-output/Glossy-*.apk

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.TAG_NAME }}
          name: Glossy ${{ env.TAG_NAME }}
          generate_release_notes: true
          files: release-output/Glossy-*.apk
